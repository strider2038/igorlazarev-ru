<!-- Yandex.Metrika counter, loaded after analytics cookie consent -->
<script type="text/javascript" >
    (function () {
        var counterId = 30070179;
        var loaded = false;

        function loadMetrika() {
            if (loaded) return;
            loaded = true;

            (function (m, e, t, r, i, k, a) {
                m[i] = m[i] || function () { (m[i].a = m[i].a || []).push(arguments); };
                m[i].l = 1 * new Date();
                for (var j = 0; j < document.scripts.length; j++) {
                    if (document.scripts[j].src === r) return;
                }
                k = e.createElement(t);
                a = e.getElementsByTagName(t)[0];
                k.async = 1;
                k.src = r;
                a.parentNode.insertBefore(k, a);
            })(window, document, "script", "https://mc.yandex.ru/metrika/tag.js", "ym");

            ym(counterId, "init", {
                clickmap: true,
                trackLinks: true,
                accurateTrackBounce: true
            });
        }

        window.addEventListener("onCookieConsentChange", function (event) {
            if (event.detail && event.detail.analytics) {
                loadMetrika();
            }
        });

        if (window.cookieConsent && window.cookieConsent.hasConsent("analytics")) {
            loadMetrika();
        }
    })();
</script>
<!-- /Yandex.Metrika counter -->

<script>
window.addEventListener("DOMContentLoaded",function(){
    var el=document.querySelector(".typing-text");
    if(!el)return;
    var parent=el.parentElement;
    var key="subtitle-typing-done:v1";
    var done=false;
    try{
        done=sessionStorage.getItem(key)==="1";
    }catch(e){}
    if(done){
        parent.classList.add("typing-done");
        return;
    }
    var text=el.textContent;
    parent.style.minWidth=parent.offsetWidth+"px";
    el.textContent="";
    var i=0;
    setTimeout(function type(){
        if(i<text.length){
            el.textContent+=text.charAt(i);
            i++;
            setTimeout(type,55+Math.random()*50);
        }else{
            try{
                sessionStorage.setItem(key,"1");
            }catch(e){}
            setTimeout(function(){parent.classList.add("typing-done");},800);
        }
    },2400);
});
</script>
